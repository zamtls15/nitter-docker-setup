[Server]
address = "0.0.0.0"
port = 8080
https = false
httpMaxConnections = 100
staticDir = "./public"
customCSS = ""

[Config]
hmacKey = "secret_key_change_me"
base64Media = false
enableRSS = true
enableThemes = true
proxy = ""
proxyAuth = ""
tokenCount = 10
# Cookie configuration from the provided JSON
# auth_token, guest_id, twid, ct0 are the most important
# Formatting for Nitter sessions.jsonl is usually required for multiple accounts,
# but for a single account in nitter.conf, we can use the following:
twitterId = "1930067373924450304"
twitterAuthToken = "a789d6e4061d761dd70bff8f8e21cb79a77465ee"
twitterGuestId = "v1%3A177338660475290170"
twitterCt0 = "92532ea9248da5746b9843ba9fa36100166f86db1154dda2087477f88895d4ed70847eb0b8f7cbab5057bbde1415dc1cff93aa90864bf985890c9ca5297e2f3d965afbb1af8936ff0401b129175311aa"

[Redis]
host = "localhost"
port = 6379
password = ""
connections = 10
maxConnections = 20
